<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CSV → SQLite</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<script src="/static/temperature_chart.js"></script>
<script src="/static/humidity_chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0f1117; color: #e2e8f0;
    min-height: 100vh; padding: 2rem;
  }
  .container { width: 100%; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #38bdf8; }

  /* tabs */
  .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; display: none; }
  .tab {
    padding: .4rem .9rem; border-radius: 6px; font-size: .75rem;
    font-family: inherit; cursor: pointer; border: 1px solid #334155;
    background: transparent; color: #94a3b8; transition: all .2s;
  }
  .tab:hover { border-color: #38bdf8; color: #e2e8f0; }
  .tab.active { background: #38bdf8; color: #0f1117; border-color: #38bdf8; font-weight: 700; }

  /* file picker */
  .file-picker { margin-bottom: 1.5rem; display: none; }
  .file-picker label { font-size: .75rem; color: #94a3b8; display: block; margin-bottom: .4rem; }
  .file-picker select {
    background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
    border-radius: 6px; padding: .5rem .75rem; font-family: inherit;
    font-size: .8rem; cursor: pointer; width: 100%;
  }
  .file-picker select:hover { border-color: #38bdf8; }
  .file-picker .pick-btn {
    display: inline-block; margin-top: .5rem; background: #38bdf8;
    color: #0f1117; border: none; border-radius: 6px; padding: .5rem 1rem;
    font-family: inherit; font-size: .8rem; font-weight: 700; cursor: pointer;
  }
  .file-picker .pick-btn:hover { opacity: .85; }
  .or-divider {
    text-align: center; color: #475569; font-size: .75rem; margin-bottom: 1.5rem;
  }

  .drop-zone {
    border: 2px dashed #334155; border-radius: 8px; padding: 2.5rem 1rem;
    text-align: center; cursor: pointer; transition: border-color .2s;
    margin-bottom: 1.5rem;
  }
  .drop-zone:hover, .drop-zone.over { border-color: #38bdf8; }
  .drop-zone input { display: none; }
  .drop-zone p { color: #94a3b8; font-size: .85rem; }
  .filename { color: #38bdf8; font-size: .8rem; margin-top: .5rem; }

  /* collapsible data table */
  .data-toggle {
    background: none; border: none; color: #94a3b8; font-family: inherit;
    font-size: .8rem; cursor: pointer; display: none; margin-bottom: .5rem;
    padding: 0;
  }
  .data-toggle:hover { color: #e2e8f0; }
  .data-toggle .arrow { display: inline-block; transition: transform .2s; margin-right: .4rem; }
  .data-toggle.collapsed .arrow { transform: rotate(-90deg); }
  .table-wrap { overflow: hidden; transition: max-height .3s ease; max-height: 400px; }
  .table-wrap.collapsed { max-height: 0; }
  table {
    width: 100%; border-collapse: collapse; margin-bottom: 1rem;
    font-size: .8rem;
  }
  th, td {
    text-align: left; padding: .5rem .75rem;
    border-bottom: 1px solid #1e293b;
  }
  th { color: #38bdf8; font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; }

  .actions { display: flex; gap: .75rem; align-items: center; margin-bottom: .5rem; }
  button {
    background: #38bdf8; color: #0f1117; border: none; border-radius: 6px;
    padding: .6rem 1.4rem; font-family: inherit; font-size: .85rem;
    font-weight: 700; cursor: pointer; display: none; transition: opacity .2s;
  }
  button:hover { opacity: .85; }
  .status { margin-top: .5rem; font-size: .8rem; color: #94a3b8; }
  #charts { margin-top: 2rem; display: none; }
  .chart { margin-bottom: 1.5rem; border-radius: 8px; overflow: hidden; }
</style>
</head>
<body>
<div class="container">
  <h1>csv → sqlite</h1>

  <div class="tabs" id="tabs"></div>

  <div class="file-picker" id="filePicker">
    <label>choose from available data files:</label>
    <select id="fileSelect"><option value="">-- select a file --</option></select>
    <button class="pick-btn" id="pickBtn">load file</button>
  </div>

  <div class="or-divider" id="orDivider" style="display:none">— or drop your own —</div>

  <div class="drop-zone" id="drop">
    <p>drop a .csv here or click to pick</p>
    <div class="filename" id="fname"></div>
    <input type="file" id="file" accept=".csv">
  </div>

  <button class="data-toggle" id="toggle" onclick="toggleTable()">
    <span class="arrow">▼</span> data preview
  </button>
  <div class="table-wrap" id="tableWrap">
    <table id="preview"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>

  <div class="actions">
    <button id="upload">upload to database</button>
  </div>
  <div class="status" id="status"></div>

  <div id="charts">
    <div class="chart" id="chart-temp"></div>
    <div class="chart" id="chart-humidity"></div>
  </div>
</div>
<script>
const filePicker=document.getElementById('filePicker'), fileSelect=document.getElementById('fileSelect'),
  pickBtn=document.getElementById('pickBtn'), orDivider=document.getElementById('orDivider'),
  drop=document.getElementById('drop'), fi=document.getElementById('file'),
  thead=document.getElementById('thead'), tbody=document.getElementById('tbody'),
  btn=document.getElementById('upload'), fname=document.getElementById('fname'),
  status=document.getElementById('status'), chartsDiv=document.getElementById('charts'),
  tabsDiv=document.getElementById('tabs'), toggle=document.getElementById('toggle'),
  tableWrap=document.getElementById('tableWrap');
let selectedFile=null, parsedData=null;

// collapse toggle
function toggleTable(){
  toggle.classList.toggle('collapsed');
  tableWrap.classList.toggle('collapsed');
}

// drop zone
drop.addEventListener('click',()=>fi.click());
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');handle(e.dataTransfer.files[0])});
fi.addEventListener('change',()=>handle(fi.files[0]));

function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.split(','));
  return {headers:lines[0].map(h=>h.trim()), rows:lines.slice(1).map(r=>r.map(c=>c.trim()))};
}

function showTable(headers, rows){
  thead.innerHTML='<tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr>';
  tbody.innerHTML=rows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('');
  toggle.style.display='block';
  toggle.classList.remove('collapsed');
  tableWrap.classList.remove('collapsed');
}

function showCharts(headers, rows){
  const di=headers.indexOf('date'), ti=headers.indexOf('temp_c'), hi=headers.indexOf('humidity');
  if(di<0||ti<0||hi<0){chartsDiv.style.display='none';return;}
  const dates=[], temps=[], humidities=[];
  rows.forEach(r=>{
    dates.push(r[di]); temps.push(parseFloat(r[ti]));
    humidities.push(parseFloat(r[hi]));
  });
  chartsDiv.style.display='block';
  renderTemperatureChart(dates, temps);
  renderHumidityChart(dates, humidities);
}

function handle(f){
  if(!f)return; selectedFile=f; fname.textContent=f.name;
  const r=new FileReader();
  r.onload=e=>{
    const {headers,rows}=parseCSV(e.target.result);
    showTable(headers,rows); showCharts(headers,rows);
    btn.style.display='inline-block'; status.textContent='';
  }; r.readAsText(f);
}

// upload
btn.addEventListener('click',async()=>{
  const name=selectedFile.name.replace(/\.csv$/i,'');
  const fd=new FormData(); fd.append('file',selectedFile); fd.append('dataset',name);
  status.textContent='uploading...';
  const res=await fetch('/upload',{method:'POST',body:fd});
  const j=await res.json();
  status.textContent='inserted '+j.inserted+' row(s) into database';
  loadDatasets();
});

// tabs - load datasets from DB
async function loadDatasets(){
  const res=await fetch('/datasets');
  const datasets=await res.json();
  if(!datasets.length){tabsDiv.style.display='none';return;}
  tabsDiv.style.display='flex';
  tabsDiv.innerHTML=datasets.map(d=>'<button class="tab" data-name="'+d+'">'+d+'</button>').join('');
  tabsDiv.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>selectDataset(t.dataset.name)));
}

async function selectDataset(name){
  tabsDiv.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.name===name));
  const res=await fetch('/datasets/'+encodeURIComponent(name));
  const data=await res.json();
  if(!data.length)return;
  const headers=Object.keys(data[0]);
  const rows=data.map(r=>headers.map(h=>String(r[h])));
  showTable(headers,rows); showCharts(headers,rows);
  chartsDiv.style.display='block';
  status.textContent='showing '+data.length+' rows from database';
}

// file picker — load available CSV files from /files
async function loadFiles(){
  const res=await fetch('/files');
  const files=await res.json();
  if(!files.length)return;
  filePicker.style.display='block';
  orDivider.style.display='block';
  fileSelect.innerHTML='<option value="">-- select a file --</option>'+
    files.map(f=>'<option value="'+f+'">'+f+'</option>').join('');
}

pickBtn.addEventListener('click',async()=>{
  const name=fileSelect.value;
  if(!name)return;
  const res=await fetch('/files/'+encodeURIComponent(name));
  const text=await res.text();
  const {headers,rows}=parseCSV(text);
  showTable(headers,rows); showCharts(headers,rows);

  // create a File object so the upload button works
  selectedFile=new File([text],name,{type:'text/csv'});
  fname.textContent=name;
  btn.style.display='inline-block'; status.textContent='';
});

// load existing datasets on page load
loadDatasets();
loadFiles();
</script>
</body>
</html>
